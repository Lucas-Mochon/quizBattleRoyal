server:
  port: 8761

spring:
  application:
    name: eureka-server
  cloud:
    compatibility-verifier:
      enabled: false

eureka:
  client:
    register-with-eureka: false
    fetch-registry: false
  server:
    enable-self-preservation: false
    expected-client-renewal-interval-seconds: 30

logging:
  level:
    com.netflix.eureka: INFO
    com.netflix.discovery: INFO
